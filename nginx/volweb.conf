worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;
    client_max_body_size 0;

    upstream volweb_backend  { server volweb-backend:8000; keepalive 16; }
    upstream volweb_frontend { server volweb-frontend:3000; }

    server {
        listen 80;
        server_name _;

        # WebSocket (Django Channels)
        location /ws/ {
            proxy_pass         http://volweb_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
        }

        # Django REST API (includes VolWeb upload endpoints)
        location /api/ {
            proxy_pass         http://volweb_backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Disable buffering for large dump uploads streamed from Heimdall
            proxy_request_buffering  off;
            proxy_buffering          off;
            proxy_read_timeout       7200s;
            proxy_send_timeout       7200s;
        }

        # Django admin + static
        location /admin/  { proxy_pass http://volweb_backend; proxy_set_header Host $host; }
        location /static/ { proxy_pass http://volweb_backend; proxy_set_header Host $host; }
        location /media/  { proxy_pass http://volweb_backend; proxy_set_header Host $host; }

        # Swagger docs
        location /swagger/ { proxy_pass http://volweb_backend; proxy_set_header Host $host; }

        # ── Heimdall SSO Magic Link ──────────────────────────────────────────
        # Servi sur le domaine VolWeb (:8888) pour que localStorage.setItem()
        # puisse écrire le token JWT VolWeb (same-origin policy).
        # Le backend Heimdall (odin:4000) valide le token Redis et retourne
        # une page HTML qui set localStorage puis redirige vers le bon cas.
        location /heimdall-sso/ {
            proxy_pass         http://odin:4000/api/volweb/sso/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
            # Pas de cache sur les pages SSO
            add_header         Cache-Control "no-store, no-cache, must-revalidate";
        }

        # React SPA (catch-all)
        location / {
            proxy_pass         http://volweb_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
