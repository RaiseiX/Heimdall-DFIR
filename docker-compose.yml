services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    container_name: yggdrasil
    restart: unless-stopped
    environment:
      POSTGRES_DB: forensiclab
      POSTGRES_USER: forensiclab
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      ANALYST_DEFAULT_PASSWORD: ${ANALYST_DEFAULT_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/zz-init-users.sh:/docker-entrypoint-initdb.d/zz-init-users.sh
    networks:
      - heimdall-net
      - volweb-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forensiclab"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
        reservations:
          cpus: "0.5"
          memory: 2g

  # ─── PgBouncer — Connection Pool Multiplexer ───
  # Routes backend + worker connections through a single pool of 25 real PG
  # connections, supporting up to 200 virtual clients. Prevents saturation of
  # PostgreSQL max_connections under concurrent parsing + VolWeb + AI analysis.
  # ─── Redis Cache & Sessions ───
  redis:
    image: redis:7-alpine
    container_name: hermod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - heimdall-net
      - volweb-net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 256m

  # ─── Node.js Backend API ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: odin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      # Route through PgBouncer for connection multiplexing
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: forensiclab
      DB_USER: forensiclab
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      UPLOAD_DIR: /app/uploads
      ZIMMERMAN_TOOLS_DIR: /app/zimmerman-tools
      HAYABUSA_BIN: /app/hayabusa/hayabusa
      HAYABUSA_DIR: /app/hayabusa
      NODE_OPTIONS: --max-old-space-size=4096
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DOCKER_GID: ${DOCKER_GID:-999}
      VOLWEB_URL: ${VOLWEB_URL:-http://hel-api:8000}
      VOLWEB_USER: ${VOLWEB_USER:-admin}
      VOLWEB_PASSWORD: ${VOLWEB_PASSWORD}
      VOLWEB_PUBLIC_URL: ${VOLWEB_PUBLIC_URL:-http://localhost:8888}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - uploads_data:/app/uploads
      - zimmerman_tools:/app/zimmerman-tools
      - evidence_data:/app/evidence
      - collections_data:/app/collections
      - temp_data:/app/temp
      - backups_data:/app/backups
      # Docker socket — read-write required for Ollama model pull from admin panel.
      # DOCKER_GID must match the host docker group: stat -c %g /var/run/docker.sock
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-999}"
    # Port 4000 NOT exposed on host — access via Traefik reverse proxy only.
    security_opt:
      - no-new-privileges:false  # gosu requires setuid; privilege drop in entrypoint.sh
    labels:
      - "traefik.enable=true"
      # Tell Traefik which network to use for routing to this container
      - "traefik.docker.network=heimdall-net"
      # ── Service: heavy transport for 10 GB+ forensic uploads (7200 s timeout) ──
      - "traefik.http.services.backend-svc.loadbalancer.server.port=4000"
      - "traefik.http.services.backend-svc.loadbalancer.passHostHeader=true"
      - "traefik.http.services.backend-svc.loadbalancer.serverstransport=heavy@file"
      # ── Router: auth — 5 req/min brute-force protection (priority 30) ──
      - "traefik.http.routers.heimdall-auth.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/auth`)"
      - "traefik.http.routers.heimdall-auth.entrypoints=websecure"
      - "traefik.http.routers.heimdall-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.heimdall-auth.middlewares=security-headers@file,auth-ratelimit@file"
      - "traefik.http.routers.heimdall-auth.service=backend-svc"
      - "traefik.http.routers.heimdall-auth.priority=30"
      # ── Router: socket.io WebSocket (priority 20) ──
      - "traefik.http.routers.heimdall-socket.rule=Host(`${DOMAIN}`) && PathPrefix(`/socket.io`)"
      - "traefik.http.routers.heimdall-socket.entrypoints=websecure"
      - "traefik.http.routers.heimdall-socket.tls.certresolver=letsencrypt"
      - "traefik.http.routers.heimdall-socket.middlewares=security-headers@file"
      - "traefik.http.routers.heimdall-socket.service=backend-svc"
      - "traefik.http.routers.heimdall-socket.priority=20"
      # ── Router: general API — 30 req/s, burst 50 (priority 10) ──
      - "traefik.http.routers.heimdall-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.heimdall-api.entrypoints=websecure"
      - "traefik.http.routers.heimdall-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.heimdall-api.middlewares=security-headers@file,api-ratelimit@file"
      - "traefik.http.routers.heimdall-api.service=backend-svc"
      - "traefik.http.routers.heimdall-api.priority=10"
    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - heimdall-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4g
        reservations:
          cpus: "0.5"
          memory: 1g

  # ─── Elasticsearch — Super Timeline full-text search ───
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: mimir
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx1g"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - heimdall-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
        reservations:
          cpus: "0.5"
          memory: 1g

  # ─── ClamAV Antivirus Scanner ───
  clamav:
    image: clamav/clamav:1.4.3
    container_name: tyr
    restart: unless-stopped
    environment:
      CLAMAV_NO_FRESHCLAM: "false"
    volumes:
      - clamav_data:/var/lib/clamav
    networks:
      - heimdall-net
    # NOTE: start_period is long because ClamAV downloads ~300 MB of signatures on first boot.
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "3"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 300s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
        reservations:
          cpus: "0.25"
          memory: 512m

  # ─── MinIO — Object Storage for VolWeb ───
  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: njord
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - heimdall-net
      - volweb-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
        reservations:
          cpus: "0.25"
          memory: 256m

  # ─── VolWeb Backend (Django/Daphne) ───
  volweb-backend:
    image: forensicxlab/volweb-backend:3.16.0
    container_name: hel-api
    restart: unless-stopped
    command: ["/init/volweb-init.sh"]
    working_dir: /home/app/web
    environment:
      DJANGO_SECRET: ${VOLWEB_DJANGO_SECRET}
      CSRF_TRUSTED_ORIGINS: ${VOLWEB_PUBLIC_URL:-http://localhost:8888}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      POSTGRES_DB: volweb
      POSTGRES_USER: forensiclab
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      BROKER_HOST: redis
      BROKER_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      DJANGO_SETTINGS_MODULE: backend.local_settings
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ENDPOINT_HOST: minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      DJANGO_SUPERUSER_USERNAME: ${VOLWEB_USER:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${VOLWEB_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: admin@forensiclab.local
    volumes:
      - volweb_media:/home/app/web/media
      - ./docker/volweb-init.sh:/init/volweb-init.sh:ro
      - ./docker/volweb_local_settings.py:/home/app/web/backend/local_settings.py:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - volweb-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/ | grep -qE '^[1-5][0-9][0-9]$'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2g
        reservations:
          cpus: "0.25"
          memory: 512m

  # ─── VolWeb Worker (Celery + Volatility 3) ───
  volweb-worker:
    image: forensicxlab/volweb-backend:3.16.0
    container_name: hel-worker
    restart: unless-stopped
    working_dir: /home/app/web
    command: ["celery", "-A", "backend", "worker", "-l", "INFO"]
    environment:
      DJANGO_SECRET: ${VOLWEB_DJANGO_SECRET}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      POSTGRES_DB: volweb
      POSTGRES_USER: forensiclab
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      BROKER_HOST: redis
      BROKER_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      DJANGO_SETTINGS_MODULE: backend.local_settings
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ENDPOINT_HOST: minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
    volumes:
      - volweb_media:/home/app/web/media
      - ./docker/volweb_local_settings.py:/home/app/web/backend/local_settings.py:ro
    depends_on:
      volweb-backend:
        condition: service_healthy
    networks:
      - volweb-net
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 12g
        reservations:
          cpus: "1.0"
          memory: 4g

  # ─── VolWeb YARA Scan Worker ───
  volweb-worker-yarascan:
    image: forensicxlab/volweb-backend:3.16.0
    container_name: hel-worker-yara
    restart: unless-stopped
    working_dir: /home/app/web
    command: ["celery", "-A", "backend", "worker", "-l", "INFO", "-Q", "yarascan", "-c", "1"]
    environment:
      DJANGO_SECRET: ${VOLWEB_DJANGO_SECRET}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      POSTGRES_DB: volweb
      POSTGRES_USER: forensiclab
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      BROKER_HOST: redis
      BROKER_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/1
      DJANGO_SETTINGS_MODULE: backend.local_settings
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ENDPOINT_HOST: minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      YARASCAN_CPU_LIMIT: ${YARASCAN_CPU_LIMIT:-2}
      YARASCAN_MEM_LIMIT: ${YARASCAN_MEM_LIMIT:-4G}
    volumes:
      - volweb_media:/home/app/web/media
      - ./docker/volweb_local_settings.py:/home/app/web/backend/local_settings.py:ro
    depends_on:
      volweb-backend:
        condition: service_healthy
    networks:
      - volweb-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 6g
        reservations:
          cpus: "0.5"
          memory: 2g

  # ─── VolWeb Frontend (React SPA) ───
  volweb-frontend:
    image: forensicxlab/volweb-frontend:3.16.0
    container_name: hel-ui
    restart: unless-stopped
    networks:
      - volweb-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
        reservations:
          cpus: "0.05"
          memory: 64m

  # ─── VolWeb Nginx (port 8888 — localhost only) ───
  volweb-nginx:
    image: nginx:alpine
    container_name: hel-proxy
    restart: unless-stopped
    # Bound to localhost only — VolWeb not directly accessible from external networks.
    ports:
      - "127.0.0.1:8888:80"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./nginx/volweb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - volweb-backend
      - volweb-frontend
    networks:
      - volweb-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128m
        reservations:
          cpus: "0.05"
          memory: 32m

  # ─── BullMQ Parser Worker ───
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: huginn
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: ["node", "src/workers/startWorker.js"]
    environment:
      NODE_ENV: production
      # Route through PgBouncer for connection multiplexing
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: forensiclab
      DB_USER: forensiclab
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      UPLOAD_DIR: /app/uploads
      ZIMMERMAN_TOOLS_DIR: /app/zimmerman-tools
      HAYABUSA_BIN: /app/hayabusa/hayabusa
      HAYABUSA_DIR: /app/hayabusa
      NODE_OPTIONS: --max-old-space-size=4096
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - uploads_data:/app/uploads
      - zimmerman_tools:/app/zimmerman-tools
      - evidence_data:/app/evidence
      - collections_data:/app/collections
      - temp_data:/app/temp
    depends_on:
      db:
        condition: service_healthy

      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - heimdall-net
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -v grep | grep -q 'startWorker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
        reservations:
          cpus: "1.0"
          memory: 2g

  # ─── React Frontend ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    container_name: asgard
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=frontend-net"
      # ── Service ──
      - "traefik.http.services.frontend-svc.loadbalancer.server.port=3000"
      # ── Router: catch-all SPA (priority 1 — lowest, backend routers win) ──
      - "traefik.http.routers.heimdall-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.heimdall-frontend.entrypoints=websecure"
      - "traefik.http.routers.heimdall-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.heimdall-frontend.middlewares=security-headers@file"
      - "traefik.http.routers.heimdall-frontend.service=frontend-svc"
      - "traefik.http.routers.heimdall-frontend.priority=1"
    networks:
      - frontend-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
        reservations:
          cpus: "0.05"
          memory: 64m

  # ─── Traefik v3 — Reverse Proxy + Automatic TLS ───
  # Replaces the static nginx setup with container-label-driven routing
  # and Let's Encrypt certificate management (zero manual SSL steps).
  #
  # DOMAIN and ACME_EMAIL must be set in .env:
  #   DOMAIN=heimdall.example.com   (or "localhost" for self-signed dev cert)
  #   ACME_EMAIL=admin@example.com  (Let's Encrypt registration email)
  #
  # On first start with a real public domain, Traefik issues a cert automatically.
  # For localhost or private networks it falls back to an internal self-signed cert.
  traefik:
    image: traefik:v3.0
    container_name: bifrost
    restart: unless-stopped
    command:
      # Load the static config file; the ACME email must be passed at runtime
      # because environment variables are not expanded inside traefik.yml.
      - "--configfile=/etc/traefik/traefik.yml"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@heimdall.local}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Docker socket — read-only is sufficient for label discovery
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - letsencrypt_data:/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - frontend-net   # Discovers and proxies to: frontend (asgard)
      - heimdall-net   # Discovers and proxies to: backend (odin)
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m

  # ─── Ollama (Local AI / LLM inference) ───
  ollama:
    image: ollama/ollama:0.6.2
    container_name: ollama
    restart: unless-stopped
    networks:
      - heimdall-net
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: "0.0.0.0"
    # GPU passthrough (uncomment for NVIDIA GPU acceleration):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 16g
        reservations:
          cpus: "1.0"
          memory: 4g

volumes:
  pg_data:
  redis_data:
  clamav_data:
  es_data:
  uploads_data:
  zimmerman_tools:
  evidence_data:
  collections_data:
  temp_data:
  volweb_media:
  minio_data:
  backups_data:
  ollama_data:
  letsencrypt_data:    # Let's Encrypt ACME certificates — persisted across restarts

networks:
  # External-facing bridge: Traefik (bifrost) ↔ frontend (asgard) only.
  # Frontend cannot reach db, redis, or backend directly.
  frontend-net:
    driver: bridge

  # Internal Heimdall services: Traefik, backend, worker, db, redis, ES, ClamAV, MinIO, Ollama.
  # Not reachable from frontend-net. Traefik bridges both networks intentionally.
  heimdall-net:
    driver: bridge

  # Isolated VolWeb stack. Shares db, redis, minio with heimdall-net via
  # multi-network assignments on those shared services.
  volweb-net:
    driver: bridge
