# Credential Access pack — T1003 / T1078 / T1558 / T1555
rules:
  - id: cred_mimikatz_strings
    name: "Mimikatz commands detected"
    severity: critical
    category: credential_access
    target_artifact: ['*']
    mitre: [T1003.001]
    tags: [CredentialAccess, Mimikatz]
    match:
      any:
        - { field: description, op: iregex, value: '(sekurlsa::|lsadump::|kerberos::|misc::memssp|privilege::debug|token::elevate)' }
        - { field: description, op: iregex, value: '\bmimikatz(\.exe)?\b' }

  - id: cred_lsass_access_sysmon
    name: "LSASS access via suspicious GrantedAccess"
    severity: critical
    category: credential_access
    target_artifact: [evtx, hayabusa]
    mitre: [T1003.001]
    tags: [CredentialAccess, LSASS]
    match:
      all:
        - { field: event_id, op: eq, value: 10 }
        - any:
            - { field: description, op: icontains, value: '0x1010' }
            - { field: description, op: icontains, value: '0x1410' }
            - { field: description, op: icontains, value: '0x1438' }

  - id: cred_dcsync
    name: "DCSync via DS-Replication-Get-Changes"
    severity: critical
    category: credential_access
    target_artifact: [evtx, hayabusa]
    mitre: [T1003.006]
    tags: [CredentialAccess, DCSync]
    match:
      all:
        - { field: event_id, op: in, value: [4662] }
        - any:
            - { field: description, op: icontains, value: '1131f6aa-9c07-11d1-f79f-00c04fc2dcd2' }
            - { field: description, op: icontains, value: '19195a5b-6da0-11d0-afd3-00c04fd930c9' }

  - id: cred_shadow_credentials
    name: "Shadow Credentials — msDS-KeyCredentialLink write"
    severity: critical
    category: credential_access
    target_artifact: [evtx, hayabusa]
    mitre: [T1556]
    tags: [CredentialAccess, ShadowCredentials]
    match:
      all:
        - { field: event_id, op: eq, value: 5136 }
        - { field: description, op: icontains, value: 'msDS-KeyCredentialLink' }

  - id: cred_sam_registry_dump
    name: "SAM/SYSTEM/SECURITY hive dump"
    severity: critical
    category: credential_access
    target_artifact: ['*']
    mitre: [T1003.002, T1003.004]
    tags: [CredentialAccess, HiveDump]
    match:
      any:
        - { field: description, op: iregex, value: 'reg(\.exe)?\s+save\s+.*(\\sam|\\system|\\security)\b' }
        - { field: description, op: iregex, value: 'esentutl(\.exe)?\s+.*/y\s+.*(ntds\.dit|sam|system)' }

  - id: cred_ntds_dit_access
    name: "NTDS.dit direct access"
    severity: critical
    category: credential_access
    target_artifact: ['*']
    mitre: [T1003.003]
    tags: [CredentialAccess, NTDS]
    match:
      any:
        - { field: description, op: icontains, value: 'ntds.dit' }
        - { field: description, op: iregex, value: 'ntdsutil(\.exe)?\s+.*ifm' }

  - id: cred_secretsdump_impacket
    name: "Impacket secretsdump.py"
    severity: critical
    category: credential_access
    target_artifact: ['*']
    mitre: [T1003]
    tags: [CredentialAccess, Impacket]
    match:
      any:
        - { field: description, op: iregex, value: '(secretsdump|smbexec|psexec|wmiexec|atexec|dcomexec)\.py' }
        - { field: description, op: iregex, value: 'impacket' }

  - id: cred_lazagne
    name: "LaZagne credential recovery"
    severity: critical
    category: credential_access
    target_artifact: ['*']
    mitre: [T1555]
    tags: [CredentialAccess, LaZagne]
    match:
      any:
        - { field: process_name, op: iregex, value: '^lazagne(\.exe)?$' }
        - { field: description, op: iregex, value: '\blazagne(\.exe)?\b' }

  - id: cred_kerberoasting_burst
    name: "Kerberoasting-style TGS requests (AS-REP/TGS RC4)"
    severity: high
    category: credential_access
    target_artifact: [evtx, hayabusa]
    mitre: [T1558.003]
    tags: [CredentialAccess, Kerberoasting]
    match:
      all:
        - { field: event_id, op: in, value: [4769] }
        - { field: description, op: iregex, value: 'ticket\s*encryption\s*type\s*[:=]\s*0x17' }

  - id: cred_skeleton_key
    name: "Skeleton Key indicators (misc::skeleton)"
    severity: critical
    category: credential_access
    target_artifact: ['*']
    mitre: [T1556.001]
    tags: [CredentialAccess, SkeletonKey]
    match:
      any:
        - { field: description, op: iregex, value: 'misc::skeleton' }
